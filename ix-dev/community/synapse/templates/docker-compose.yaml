{% set tpl = ix_lib.base.render.Render(values) %}

{% set c1 = tpl.add_container(values.consts.synapse_container_name, "image") %}
{% set perm_container = tpl.deps.perms(values.consts.perms_container_name) %}

{% set pg_config = {
  "user": values.consts.db_user,
  "password": values.synapse.db_password,
  "database": values.consts.db_name,
  "volume": values.storage.postgres_data,
} %}
{% set postgres = tpl.deps.postgres(
  values.consts.postgres_container_name,
  values.synapse.postgres_image_selector,
  pg_config, perm_container
) %}

{% do c1.set_user(991, 991) %}
{% do c1.healthcheck.set_test("wget", {"port": values.network.web_port.port_number, "path": "/health"}) %}
{% do c1.depends.add_dependency(values.consts.postgres_container_name, "service_healthy") %}

{% do c1.environment.add_env("SYNAPSE_SERVER_NAME", values.synapse.server_name) %}
{% do c1.environment.add_env("SYNAPSE_REPORT_STATS", "yes" if values.synapse.report_stats else "no") %}
{% do c1.environment.add_env("SYNAPSE_HTTP_PORT", values.network.web_port.port_number) %}
{% do c1.environment.add_env("SYNAPSE_CONFIG_DIR", "/data") %}
{% do c1.environment.add_env("SYNAPSE_DATA_DIR", "/data") %}
{% do c1.environment.add_env("POSTGRES_HOST", values.consts.postgres_container_name) %}
{% do c1.environment.add_env("POSTGRES_PORT", 5432) %}
{% do c1.environment.add_env("POSTGRES_USER", values.consts.db_user) %}
{% do c1.environment.add_env("POSTGRES_PASSWORD", values.synapse.db_password) %}
{% do c1.environment.add_env("POSTGRES_DB", values.consts.db_name) %}
{% do c1.environment.add_env("SYNAPSE_ENABLE_REGISTRATION", values.synapse.enable_registration) %}
{% do c1.environment.add_env("UID", 991) %}
{% do c1.environment.add_env("GID", 991) %}
{% do c1.environment.add_user_envs(values.synapse.additional_envs) %}

{% do c1.add_port(values.network.web_port) %}

{% do c1.add_storage("/data", values.storage.synapse_data) %}
{% do perm_container.add_or_skip_action("synapse_data", values.storage.synapse_data, {"uid": 991, "gid": 991, "mode": "check"}) %}

{% for store in values.storage.additional_storage %}
  {% do c1.add_storage(store.mount_path, store) %}
{% endfor %}

{% if perm_container.has_actions() %}
  {% do perm_container.activate() %}
  {% do postgres.add_dependency(values.consts.perms_container_name, "service_completed_successfully") %}
{% endif %}

{% do tpl.portals.add(values.network.web_port) %}
{% do tpl.notes.set_body(values.consts.notes_body) %}

{{ tpl.render() | tojson }}
